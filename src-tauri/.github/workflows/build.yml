name: Build Cuaderno Docente
on:
  push:
    tags:
      - 'v*'
jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: npm install
      - run: npm run build
      - name: Add macOS targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - name: Tauri build (Linux/Windows)
        if: matrix.platform != 'macos-latest'
        run: npm run tauri build
      - name: Tauri build (macOS)
        if: matrix.platform == 'macos-latest'
        run: npm run tauri build -- --target aarch64-apple-darwin
      - name: Debug bundles macOS
        if: matrix.platform == 'macos-latest'
        run: find src-tauri/target -name "*.dmg" -o -name "*.app.tar.gz" || echo "No encontrado"
      - name: Debug bundles Linux
        if: matrix.platform == 'ubuntu-22.04'
        run: find src-tauri/target/release/bundle -type f
      - name: Debug bundles Windows
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: Get-ChildItem -Recurse src-tauri\target\release\bundle
      - name: Upload macOS
        if: matrix.platform == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/**/bundle/dmg/*.dmg
            src-tauri/target/**/bundle/macos/*.app.tar.gz
      - name: Upload Linux
        if: matrix.platform == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
      - name: Upload Windows
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
